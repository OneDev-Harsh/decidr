<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded dark background matching 'bg-black border border-zinc-800' -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="#000000" stroke="#27272a" stroke-width="1.5" />
  
  <defs>
    <!-- Subtle top-left zinc highlight -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3f3f46" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Crimson bottom line gradient -->
    <linearGradient id="crimsonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc143c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#dc143c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#dc143c" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Filter for glowing crimson dot -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.0" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect x="1.5" y="1.5" width="29" height="29" rx="7.5" fill="url(#bgGrad)" />

  <!-- Heavy modern "D" in zinc-100 -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="17" fill="#f4f4f5" letter-spacing="-0.5">D</text>

  <!-- Glowing Crimson Dot at top-right (The "Pinch" of Crimson) -->
  <circle cx="23.5" cy="8.5" r="1.5" fill="#dc143c" filter="url(#glow)" />
  <circle cx="23.5" cy="8.5" r="0.8" fill="#ff4d6d" />
  
  <!-- Subtle crimson bottom highlight -->
  <line x1="6" y1="28.5" x2="26" y2="28.5" stroke="url(#crimsonGrad)" stroke-width="1" />
</svg>
